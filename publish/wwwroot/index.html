<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Assistant IA Vocal</title>
    <link rel="stylesheet" href="~/css/assistant.css" />
</head>
<body>
    <div id="app">
        <div class="status-bar">
            <span class="status-dot" id="status-dot"></span>
            <span id="status-text">Prêt</span>
        </div>

        <div class="avatar-area">
            <div class="avatar-glow" id="avatar-glow"></div>
            <div class="avatar-ring" id="avatar-ring">
                <video id="avatar-video" autoplay playsinline></video>
                <div class="avatar-placeholder" id="avatar-placeholder">
                    <svg viewBox="0 0 100 100" width="100" height="100">
                        <circle cx="50" cy="50" r="45" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.2"/>
                        <circle cx="50" cy="38" r="12" fill="currentColor" opacity="0.15"/>
                        <path d="M28 72 Q50 56 72 72" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.2"/>
                    </svg>
                </div>
            </div>

            <div class="transcript" id="transcript"></div>

            <div class="wave-bars" id="wave-bars">
                <span></span><span></span><span></span><span></span><span></span>
                <span></span><span></span><span></span><span></span><span></span>
            </div>
        </div>

        <div class="controls-area">
            <button class="btn-start" id="btn-start" title="Démarrer la conversation">
                <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
                    <polygon points="5,3 19,12 5,21"/>
                </svg>
                <span>Démarrer la conversation</span>
            </button>

            <button class="btn-mic" id="btn-mic" title="Appuyez pour parler" disabled>
                <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="9" y="1" width="6" height="12" rx="3"/>
                    <path d="M5 10a7 7 0 0014 0"/>
                    <line x1="12" y1="19" x2="12" y2="23"/>
                    <line x1="8" y1="23" x2="16" y2="23"/>
                </svg>
            </button>

            <button class="btn-stop" id="btn-stop" title="Terminer la conversation" disabled>
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="6" y="6" width="12" height="12" rx="2"/>
                </svg>
                <span>Terminer</span>
            </button>
        </div>

        <div class="chat-drawer" id="chat-drawer">
            <button class="drawer-toggle" id="drawer-toggle">Historique</button>
            <div class="drawer-content" id="drawer-content">
                <div class="chat-messages" id="chat-messages"></div>
            </div>
        </div>
    </div>

    <script src="~/js/assistant.js"></script>
</body>
</html>
